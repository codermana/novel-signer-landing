<!-- Novel pdf signer - icon-only square (use as favicon or app icon)
     Save as novel-pdf-signer-icon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 128 128" role="img" aria-label="Novel pdf signer icon">
  <defs>
    <linearGradient id="ig1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FF5A48"/>
      <stop offset="1" stop-color="#D33A2B"/>
    </linearGradient>
    <linearGradient id="ig2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4C9BF5"/>
      <stop offset="1" stop-color="#2B7DE8"/>
    </linearGradient>
    <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="20" fill="#0F1724"/>

  <!-- PDF page -->
  <g transform="translate(16,12)" filter="url(#s)">
    <path d="M12 0 h72 a4 4 0 0 1 4 4 v72 a8 8 0 0 1 -8 8 H12 a8 8 0 0 1 -8 -8 V4 a4 4 0 0 1 4 -4 z" fill="white"/>
    <path d="M76 0 v14 a4 4 0 0 0 4 4 h14" fill="#F7F7F9" opacity="0.95"/>
    <rect x="20" y="22" width="44" height="6" rx="1.4" fill="url(#ig1)"/>
    <rect x="20" y="32" width="34" height="5" rx="1.2" fill="#EEE"/>
  </g>

  <!-- small token/lock -->
  <g transform="translate(78,72)">
    <rect x="0" y="0" width="32" height="20" rx="3" fill="#101828"/>
    <rect x="3" y="2" width="6" height="6" rx="1" fill="#E6B85B"/>
    <rect x="11" y="2" width="6" height="6" rx="1" fill="#E6B85B"/>
    <rect x="19" y="2" width="6" height="6" rx="1" fill="#E6B85B"/>

    <g transform="translate(-6,-10)">
      <rect x="6" y="2" width="20" height="16" rx="2.4" fill="url(#ig2)"/>
      <path d="M12 8 a4 4 0 0 1 8 0 v2 h-2 v-2 a2 2 0 0 0 -4 0 v2 h-2 z" fill="white"/>
      <rect x="14" y="11" width="4" height="3" rx="0.8" fill="#08306B"/>
    </g>
  </g>
</svg>
